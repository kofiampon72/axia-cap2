name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/internal-utility-service

jobs:
  # ============================================================
  # JOB 1: Test — runs on every push and PR
  # ============================================================
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run flake8 linting
        run: |
          flake8 . --max-line-length=100 --exclude=venv,__pycache__

      - name: Run pytest
        run: |
          pytest test_app.py -v

  # ============================================================
  # JOB 2: Build & Push — only runs on push to main after tests pass
  # ============================================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short commit SHA
        id: sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:v1.0.${{ github.run_number }}
            ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.SHORT_SHA }}

  # ================================================================
  # JOB 3: Deploy — SSHs into EC2 and runs the blue-green deployment
  # ================================================================
  deploy:
    name: Deploy to EC2  
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Blue-Green Deployment to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/internal-utility-service:latest"
            BLUE_NAME="internal-utility-service-blue"
            GREEN_NAME="internal-utility-service-green"

            echo "Pulling latest image..."
            docker pull $IMAGE

            # Determine which container is currently active
            if docker ps -q -f name=$BLUE_NAME | grep -q .; then
                CURRENT=$BLUE_NAME
                NEW=$GREEN_NAME
                NEW_PORT=5001
            else
                CURRENT=$GREEN_NAME
                NEW=$BLUE_NAME
                NEW_PORT=5000
            fi

            echo "Starting new container: $NEW on port $NEW_PORT"
            docker stop $NEW 2>/dev/null || true
            docker rm $NEW 2>/dev/null || true

            docker run -d \
              --name $NEW \
              --restart unless-stopped \
              -p $NEW_PORT:5000 \
              -e SECRET_NAME=internal-utility-service/production \
              -e AWS_REGION=us-east-1 \
              $IMAGE

            # Wait for health check to pass
            echo "Waiting for health check..."
            sleep 15

            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$NEW_PORT/health)

            if [ "$HEALTH" == "200" ]; then
                echo "New container is healthy. Switching traffic..."
                sudo sed -i "s/localhost:[0-9]*/localhost:$NEW_PORT/" /etc/nginx/sites-available/default
                sudo nginx -s reload
                echo "Stopping old container: $CURRENT"
                docker stop $CURRENT 2>/dev/null || true
                echo "Deployment successful! Now serving on port $NEW_PORT"
            else
                echo "Health check failed! Rolling back..."
                docker stop $NEW 2>/dev/null || true
                echo "Rollback complete. Old container still running."
                exit 1
            fi
